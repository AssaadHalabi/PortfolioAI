name: Keep Hugging Face Space Awake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-hf-space-awake
  cancel-in-progress: false

jobs:
  check-space:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SPACE_URL: ${{ secrets.HUGGING_FACE_SPACE_URL }}
      READY_TEXT: ${{ vars.HUGGING_FACE_READY_TEXT }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Install Playwright
        run: npm install -g playwright

      - name: Install browser dependencies
        run: playwright install --with-deps chromium

      - name: Open Space and capture screenshot
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$SPACE_URL" ]; then
            echo "HUGGING_FACE_SPACE_URL is not configured."
            exit 1
          fi

          export NODE_PATH="$(npm root -g)"

          node <<'NODE'
          const { chromium } = require("playwright");

          const spaceUrl = process.env.SPACE_URL;
          const readyText = process.env.READY_TEXT || "Ask Assaad's";
          const waitMs = 300_000;

          async function bodyText(frame) {
            return await frame.locator("body").innerText({ timeout: 1_000 }).catch(() => "");
          }

          async function waitForReadyText(page, text) {
            const deadline = Date.now() + waitMs;

            while (Date.now() < deadline) {
              for (const frame of page.frames()) {
                const textContent = await bodyText(frame);

                if (textContent.includes(text)) {
                  console.log(`Ready text found in ${frame.url() || "main frame"}`);
                  return;
                }
              }

              await page.waitForTimeout(2_000);
            }

            throw new Error(`Timed out waiting for ready text: ${text}`);
          }

          const browser = await chromium.launch();
          const page = await browser.newPage({
            viewport: { width: 1280, height: 720 },
            deviceScaleFactor: 1,
          });

          try {
            const response = await page.goto(spaceUrl, {
              waitUntil: "domcontentloaded",
              timeout: waitMs,
            });

            console.log(`Opened ${page.url()} with status ${response?.status() ?? "unknown"}`);
            await page.waitForLoadState("networkidle", { timeout: 60_000 }).catch(() => {});
            await waitForReadyText(page, readyText);
            await page.screenshot({ path: "page.png", fullPage: true });
          } catch (error) {
            console.error(error);
            await page.screenshot({ path: "page.png", fullPage: true }).catch(() => {});
            throw error;
          } finally {
            await browser.close();
          }
          NODE

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: huggingface-space-screenshot
          path: page.png
          if-no-files-found: ignore

      - name: Notify Discord
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          message="Hugging Face Space check finished with status: ${JOB_STATUS}"

          if [ -f page.png ]; then
            curl --fail-with-body -sS -X POST \
              -F "payload_json={\"content\":\"${message}\"}" \
              -F "file1=@page.png;type=image/png" \
              "$DISCORD_WEBHOOK_URL"
          else
            curl --fail-with-body -sS -X POST \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"${message}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
